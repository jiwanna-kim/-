<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 420" width="1100" height="420" font-family="'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#faf0ff;stop-opacity:1"/>
    </linearGradient>

    <!-- Card gradients -->
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b"/>
      <stop offset="100%" style="stop-color:#38f9d7"/>
    </linearGradient>
    <linearGradient id="grad5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a"/>
      <stop offset="100%" style="stop-color:#fee140"/>
    </linearGradient>

    <!-- Arrow gradient -->
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c0c8e8"/>
      <stop offset="100%" style="stop-color:#d8b4fe"/>
    </linearGradient>

    <!-- Drop shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#00000020"/>
    </filter>
    <filter id="shadowLight" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000015"/>
    </filter>

    <!-- Arrow marker -->
    <marker id="arrowHead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a5b4fc"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="420" fill="url(#bgGrad)" rx="20"/>

  <!-- Subtle background dots pattern -->
  <g opacity="0.15">
    <circle cx="50" cy="50" r="3" fill="#667eea"/>
    <circle cx="150" cy="30" r="2" fill="#f093fb"/>
    <circle cx="250" cy="60" r="3" fill="#4facfe"/>
    <circle cx="900" cy="40" r="2" fill="#43e97b"/>
    <circle cx="1000" cy="60" r="3" fill="#fa709a"/>
    <circle cx="1050" cy="30" r="2" fill="#667eea"/>
    <circle cx="80" cy="380" r="2" fill="#f093fb"/>
    <circle cx="200" cy="390" r="3" fill="#4facfe"/>
    <circle cx="950" cy="380" r="2" fill="#43e97b"/>
    <circle cx="1060" cy="390" r="3" fill="#fa709a"/>
  </g>

  <!-- Title -->
  <text x="550" y="50" text-anchor="middle" font-size="22" font-weight="700" fill="#3b3f6e" letter-spacing="1">마케팅 업무 프로세스</text>
  <line x1="420" y1="60" x2="680" y2="60" stroke="#a5b4fc" stroke-width="2" stroke-dasharray="4,3" opacity="0.7"/>

  <!-- ====== STEP 1: 기획 ====== -->
  <g filter="url(#shadow)">
    <rect x="40" y="100" width="160" height="220" rx="18" fill="white"/>
    <rect x="40" y="100" width="160" height="220" rx="18" fill="url(#grad1)" opacity="0.08"/>
    <rect x="40" y="100" width="160" height="6" rx="3" fill="url(#grad1)"/>
  </g>
  <!-- Step badge -->
  <circle cx="120" cy="97" r="14" fill="url(#grad1)" filter="url(#shadowLight)"/>
  <text x="120" y="102" text-anchor="middle" font-size="13" font-weight="700" fill="white">1</text>
  <!-- Icon circle -->
  <circle cx="120" cy="175" r="38" fill="url(#grad1)" opacity="0.12"/>
  <!-- Lightbulb icon -->
  <g transform="translate(120,175)">
    <circle cx="0" cy="-8" r="15" fill="none" stroke="#667eea" stroke-width="2.5"/>
    <path d="M-7,-8 Q-9,4 -5,10 L5,10 Q9,4 7,-8" fill="none" stroke="#667eea" stroke-width="2"/>
    <line x1="-5" y1="10" x2="5" y2="10" stroke="#667eea" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-4" y1="14" x2="4" y2="14" stroke="#764ba2" stroke-width="2" stroke-linecap="round"/>
    <line x1="-2" y1="18" x2="2" y2="18" stroke="#764ba2" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="-28" x2="0" y2="-24" stroke="#f0c040" stroke-width="2" stroke-linecap="round"/>
    <line x1="12" y1="-22" x2="9" y2="-19" stroke="#f0c040" stroke-width="2" stroke-linecap="round"/>
    <line x1="-12" y1="-22" x2="-9" y2="-19" stroke="#f0c040" stroke-width="2" stroke-linecap="round"/>
  </g>
  <text x="120" y="232" text-anchor="middle" font-size="17" font-weight="700" fill="#3b3f6e">기획</text>
  <text x="120" y="252" text-anchor="middle" font-size="11" fill="#6b7280">목표 설정</text>
  <text x="120" y="267" text-anchor="middle" font-size="11" fill="#6b7280">전략 수립</text>
  <text x="120" y="282" text-anchor="middle" font-size="11" fill="#6b7280">예산 계획</text>

  <!-- Arrow 1→2 -->
  <g>
    <line x1="205" y1="210" x2="248" y2="210" stroke="url(#arrowGrad)" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowHead)"/>
    <text x="226" y="204" text-anchor="middle" font-size="9" fill="#9ca3af"></text>
  </g>

  <!-- ====== STEP 2: 콘텐츠 제작 ====== -->
  <g filter="url(#shadow)">
    <rect x="255" y="100" width="160" height="220" rx="18" fill="white"/>
    <rect x="255" y="100" width="160" height="220" rx="18" fill="url(#grad2)" opacity="0.08"/>
    <rect x="255" y="100" width="160" height="6" rx="3" fill="url(#grad2)"/>
  </g>
  <circle cx="335" cy="97" r="14" fill="url(#grad2)" filter="url(#shadowLight)"/>
  <text x="335" y="102" text-anchor="middle" font-size="13" font-weight="700" fill="white">2</text>
  <!-- Icon circle -->
  <circle cx="335" cy="175" r="38" fill="url(#grad2)" opacity="0.10"/>
  <!-- Pencil/edit icon -->
  <g transform="translate(335,175)">
    <rect x="-14" y="-5" width="22" height="16" rx="3" fill="none" stroke="#f093fb" stroke-width="2.2"/>
    <line x1="-10" y1="1" x2="4" y2="1" stroke="#f5576c" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="-10" y1="6" x2="0" y2="6" stroke="#f5576c" stroke-width="1.8" stroke-linecap="round"/>
    <g transform="translate(10,-12) rotate(45)">
      <rect x="-3" y="-10" width="6" height="14" rx="2" fill="#f093fb"/>
      <polygon points="-3,4 3,4 0,9" fill="#f5576c"/>
      <rect x="-3" y="-13" width="6" height="4" rx="1" fill="#fda4af"/>
    </g>
  </g>
  <text x="335" y="232" text-anchor="middle" font-size="17" font-weight="700" fill="#3b3f6e">콘텐츠 제작</text>
  <text x="335" y="252" text-anchor="middle" font-size="11" fill="#6b7280">카피라이팅</text>
  <text x="335" y="267" text-anchor="middle" font-size="11" fill="#6b7280">디자인 작업</text>
  <text x="335" y="282" text-anchor="middle" font-size="11" fill="#6b7280">영상·이미지 제작</text>

  <!-- Arrow 2→3 -->
  <line x1="420" y1="210" x2="463" y2="210" stroke="url(#arrowGrad)" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowHead)"/>

  <!-- ====== STEP 3: 검토 ====== -->
  <g filter="url(#shadow)">
    <rect x="470" y="100" width="160" height="220" rx="18" fill="white"/>
    <rect x="470" y="100" width="160" height="220" rx="18" fill="url(#grad3)" opacity="0.08"/>
    <rect x="470" y="100" width="160" height="6" rx="3" fill="url(#grad3)"/>
  </g>
  <circle cx="550" cy="97" r="14" fill="url(#grad3)" filter="url(#shadowLight)"/>
  <text x="550" y="102" text-anchor="middle" font-size="13" font-weight="700" fill="white">3</text>
  <!-- Icon circle -->
  <circle cx="550" cy="175" r="38" fill="url(#grad3)" opacity="0.10"/>
  <!-- Magnifier/checklist icon -->
  <g transform="translate(550,175)">
    <circle cx="-3" cy="-5" r="11" fill="none" stroke="#4facfe" stroke-width="2.5"/>
    <line x1="5" y1="3" x2="13" y2="11" stroke="#00f2fe" stroke-width="3" stroke-linecap="round"/>
    <line x1="-7" y1="-5" x2="-1" y2="-5" stroke="#4facfe" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="-7" y1="-1" x2="1" y2="-1" stroke="#4facfe" stroke-width="1.8" stroke-linecap="round"/>
    <polyline points="-8,10 -5,14 2,6" fill="none" stroke="#43e97b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="550" y="232" text-anchor="middle" font-size="17" font-weight="700" fill="#3b3f6e">검토</text>
  <text x="550" y="252" text-anchor="middle" font-size="11" fill="#6b7280">품질 검수</text>
  <text x="550" y="267" text-anchor="middle" font-size="11" fill="#6b7280">내부 승인</text>
  <text x="550" y="282" text-anchor="middle" font-size="11" fill="#6b7280">수정 및 보완</text>

  <!-- Arrow 3→4 -->
  <line x1="635" y1="210" x2="678" y2="210" stroke="url(#arrowGrad)" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowHead)"/>

  <!-- ====== STEP 4: 배포 ====== -->
  <g filter="url(#shadow)">
    <rect x="685" y="100" width="160" height="220" rx="18" fill="white"/>
    <rect x="685" y="100" width="160" height="220" rx="18" fill="url(#grad4)" opacity="0.08"/>
    <rect x="685" y="100" width="160" height="6" rx="3" fill="url(#grad4)"/>
  </g>
  <circle cx="765" cy="97" r="14" fill="url(#grad4)" filter="url(#shadowLight)"/>
  <text x="765" y="102" text-anchor="middle" font-size="13" font-weight="700" fill="white">4</text>
  <!-- Icon circle -->
  <circle cx="765" cy="175" r="38" fill="url(#grad4)" opacity="0.10"/>
  <!-- Rocket/send icon -->
  <g transform="translate(765,175)">
    <path d="M0,-16 Q14,-10 14,4 Q14,12 8,16 L6,8 L-2,16 Q-8,14 -10,8 L-2,6 Q-10,0 -14,0 Q-10,-12 0,-16 Z" fill="#43e97b" opacity="0.9"/>
    <circle cx="4" cy="-2" r="4" fill="white" opacity="0.85"/>
    <path d="M-10,12 Q-14,18 -18,16 Q-16,12 -14,8" fill="#38f9d7" opacity="0.8"/>
  </g>
  <text x="765" y="232" text-anchor="middle" font-size="17" font-weight="700" fill="#3b3f6e">배포</text>
  <text x="765" y="252" text-anchor="middle" font-size="11" fill="#6b7280">채널 선택</text>
  <text x="765" y="267" text-anchor="middle" font-size="11" fill="#6b7280">스케줄 발행</text>
  <text x="765" y="282" text-anchor="middle" font-size="11" fill="#6b7280">SNS·광고 집행</text>

  <!-- Arrow 4→5 -->
  <line x1="850" y1="210" x2="893" y2="210" stroke="url(#arrowGrad)" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowHead)"/>

  <!-- ====== STEP 5: 성과 분석 ====== -->
  <g filter="url(#shadow)">
    <rect x="900" y="100" width="160" height="220" rx="18" fill="white"/>
    <rect x="900" y="100" width="160" height="220" rx="18" fill="url(#grad5)" opacity="0.08"/>
    <rect x="900" y="100" width="160" height="6" rx="3" fill="url(#grad5)"/>
  </g>
  <circle cx="980" cy="97" r="14" fill="url(#grad5)" filter="url(#shadowLight)"/>
  <text x="980" y="102" text-anchor="middle" font-size="13" font-weight="700" fill="white">5</text>
  <!-- Icon circle -->
  <circle cx="980" cy="175" r="38" fill="url(#grad5)" opacity="0.10"/>
  <!-- Bar chart icon -->
  <g transform="translate(980,175)">
    <line x1="-14" y1="12" x2="14" y2="12" stroke="#fa709a" stroke-width="2" stroke-linecap="round"/>
    <rect x="-12" y="-2" width="7" height="14" rx="2" fill="#fa709a" opacity="0.9"/>
    <rect x="-3" y="-10" width="7" height="22" rx="2" fill="#fee140" opacity="0.9"/>
    <rect x="6" y="-16" width="7" height="28" rx="2" fill="#fa709a" opacity="0.7"/>
    <polyline points="-8,-6 1,-14 10,-20" fill="none" stroke="#fee140" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="3,2"/>
    <circle cx="10" cy="-20" r="2.5" fill="#fee140"/>
  </g>
  <text x="980" y="232" text-anchor="middle" font-size="17" font-weight="700" fill="#3b3f6e">성과 분석</text>
  <text x="980" y="252" text-anchor="middle" font-size="11" fill="#6b7280">KPI 측정</text>
  <text x="980" y="267" text-anchor="middle" font-size="11" fill="#6b7280">리포트 작성</text>
  <text x="980" y="282" text-anchor="middle" font-size="11" fill="#6b7280">인사이트 도출</text>

  <!-- Feedback loop arrow (bottom, from step5 back to step1) -->
  <g opacity="0.55">
    <path d="M980,325 Q980,370 550,370 Q120,370 120,325" fill="none" stroke="#a5b4fc" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowHead)"/>
    <rect x="430" y="356" width="140" height="22" rx="11" fill="#ede9fe"/>
    <text x="500" y="371" text-anchor="middle" font-size="11" fill="#7c3aed" font-weight="600">피드백 &amp; 개선</text>
  </g>

  <!-- Footer -->
  <text x="550" y="408" text-anchor="middle" font-size="10" fill="#9ca3af" letter-spacing="0.5">Marketing Workflow · 2026</text>
</svg>
